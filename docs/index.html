<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Growth Simulator</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <aside id="panel">
      <h1>Crystal Sim</h1>

      <section>
        <label>Steps / frame
          <input id="stepsPerFrame" type="range" min="1" max="2000" value="200" />
          <span id="stepsPerFrameVal">200</span>
        </label>
      </section>

      <section>
        <label>Temperature (kT)
          <input id="temperature" type="range" min="0.1" max="5" step="0.05" value="1.0" />
          <span id="temperatureVal">1.00</span>
        </label>
      </section>

      <!-- Chemical potential sliders are injected by controls.js after WASM init -->
      <section id="muSection">
        <h3>Chemical potentials (μ)</h3>
      </section>

      <section id="stats">
        <div>Particles: <span id="statParticles">0</span></div>
        <div>Time: <span id="statTime">0.000</span></div>
        <div>FPS: <span id="statFps">0</span></div>
      </section>

      <section>
        <label>
          <input id="showBonds" type="checkbox" checked /> Show bonds
        </label>
      </section>

      <section>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </section>
    </aside>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
